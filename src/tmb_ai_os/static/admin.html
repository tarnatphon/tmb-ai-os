<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TMB AI OS Admin</title>
<style>
body{font-family:system-ui;margin:0;background:#f5f7f6;color:#21332a}
header{background:#244f3b;color:#fff;padding:20px 28px;display:flex;justify-content:space-between}
main{max-width:1200px;margin:24px auto;padding:0 20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}
.card{background:#fff;border-radius:12px;padding:18px;box-shadow:0 2px 8px #0000000f}
.value{font-size:28px;font-weight:700;margin-top:8px}
.ok{color:#18794e}.bad{color:#b42318}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{padding:10px;text-align:left;border-bottom:1px solid #e5e7eb;font-size:14px}
button{border:0;background:#244f3b;color:white;padding:10px 16px;border-radius:8px;cursor:pointer}
.secondary{background:#6b7280}
section>h2,.section-heading h2{margin:0 0 12px}
.section-heading{display:flex;align-items:center;justify-content:space-between}
.muted{font-size:13px;color:#6b7280;margin-bottom:12px}
.neutral{color:#374151}
.status{font-size:13px;font-weight:600;padding:6px 10px;border-radius:999px;background:#e5e7eb;color:#374151}
.status.live{background:#dcfce7;color:#166534}
.status.refreshing{background:#dbeafe;color:#1d4ed8}
.status.paused{background:#f3f4f6;color:#6b7280}
.status.error{background:#fee2e2;color:#b42318}
.controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.controls select{padding:8px;border:1px solid #d1d5db;border-radius:8px;background:#fff}
.controls button{padding:8px 12px}
.countdown{font-size:13px;color:#6b7280}
</style>
</head>
<body>
<header>
  <h1>TMB AI OS — Secure Operations Dashboard</h1>
  <button class="secondary" onclick="logout()">ออกจากระบบ</button>
</header>
<main>
<button onclick="loadAll()">รีเฟรชข้อมูล</button>

<section aria-labelledby="operations-heading">
<h2 id="operations-heading">ภาพรวมระบบ</h2>
<div class="grid" id="summary"></div>
</section>

<section aria-labelledby="alerts-heading" style="margin-top:24px">
<div class="section-heading">
  <div>
    <h2 id="alerts-heading">Alert Delivery Metrics</h2>
    <div class="muted" id="alerts-updated">กำลังโหลดข้อมูล...</div>
    <div class="countdown" id="alert-refresh-countdown"></div>
  </div>
  <div class="controls">
    <select id="alert-refresh-interval" aria-label="Alert refresh interval">
      <option value="10000">10 วินาที</option>
      <option value="30000">30 วินาที</option>
      <option value="60000">60 วินาที</option>
    </select>
    <button type="button" id="alert-refresh-toggle">ปิด Auto Refresh</button>
    <button type="button" id="alert-refresh-now">Refresh Alerts</button>
    <div class="status refreshing" id="alert-live-status">Refreshing</div>
  </div>
</div>
<div class="grid" id="alert-summary"></div>
</section>

<div class="card" style="margin-top:20px">
<h2>Incidents ล่าสุด</h2>
<table><tbody id="incidents"></tbody></table>
</div>
<div class="card" style="margin-top:20px">
<h2>Notification Deliveries ล่าสุด</h2>
<table><tbody id="notifications"></tbody></table>
</div>
</main>
<script>
const apiKey=sessionStorage.getItem("tmb_admin_api_key");
const ALERT_REFRESH_ENABLED_KEY="tmb_alert_refresh_enabled";
const ALERT_REFRESH_INTERVAL_KEY="tmb_alert_refresh_interval";
const DEFAULT_ALERT_REFRESH_INTERVAL_MS=10000;

let alertRefreshTimer=null;
let alertCountdownTimer=null;
let alertRefreshInFlight=false;
let alertRefreshEnabled=
  localStorage.getItem(ALERT_REFRESH_ENABLED_KEY)!=="false";
let alertRefreshIntervalMs=
  Number(localStorage.getItem(ALERT_REFRESH_INTERVAL_KEY))
  ||DEFAULT_ALERT_REFRESH_INTERVAL_MS;
let nextAlertRefreshAt=null;

if(!apiKey){window.location.href="/admin/login"}

async function fetchJson(url,options={}){
  options.headers={...(options.headers||{}),"X-API-Key":apiKey};
  const response=await fetch(url,options);
  if(response.status===401||response.status===403){
    sessionStorage.removeItem("tmb_admin_api_key");
    window.location.href="/admin/login";
    throw new Error("Unauthorized");
  }
  if(!response.ok){throw new Error(`HTTP ${response.status}`)}
  return response.json();
}

function card(title,value,good=true){
  return `<div class="card"><div>${title}</div><div class="value ${good?"ok":"bad"}">${value}</div></div>`;
}

function neutralCard(title,value){
  return `<div class="card"><div>${title}</div><div class="value neutral">${value}</div></div>`;
}

function formatPercent(value){
  return `${(Number(value)*100).toFixed(1)}%`;
}

function formatDateTime(value){
  const date=new Date(value);
  return Number.isNaN(date.getTime())
    ?"ไม่ทราบเวลา"
    :date.toLocaleString("th-TH");
}

function setAlertStatus(label,state){
  const element=document.getElementById("alert-live-status");
  element.textContent=label;
  element.className=`status ${state}`;
}

async function loadAlertMetrics(){
  if(alertRefreshInFlight){return}

  alertRefreshInFlight=true;
  setAlertStatus("Refreshing","refreshing");

  try{
    const alerts=await fetchJson("/v27/admin/dashboard/alerts");

    document.getElementById("alert-summary").innerHTML=[
      neutralCard("Alerts Routed",alerts.routing.routed_total),
      card(
        "Delivery Success Rate",
        formatPercent(alerts.delivery.success_rate),
        alerts.delivery.failed_total===0
      ),
      card(
        "Delivery Failed",
        alerts.delivery.failed_total,
        alerts.delivery.failed_total===0
      ),
      card(
        "Delivery Suppressed",
        alerts.delivery.suppressed_total,
        alerts.delivery.suppressed_total===0
      ),
      card(
        "Fallback Alerts",
        alerts.routing.fallback_total,
        alerts.routing.fallback_total===0
      ),
      card(
        "No Route",
        alerts.routing.no_route_total,
        alerts.routing.no_route_total===0
      )
    ].join("");

    document.getElementById("alerts-updated").textContent=
      `อัปเดตล่าสุด: ${formatDateTime(alerts.generated_at)}`;

    setAlertStatus("Live","live");
  }catch(error){
    setAlertStatus("Error","error");
    throw error;
  }finally{
    alertRefreshInFlight=false;
  }
}

function updateRefreshControls(){
  const toggle=document.getElementById("alert-refresh-toggle");
  const interval=document.getElementById("alert-refresh-interval");

  toggle.textContent=alertRefreshEnabled
    ?"ปิด Auto Refresh"
    :"เปิด Auto Refresh";

  interval.value=String(alertRefreshIntervalMs);
}

function updateAlertCountdown(){
  const element=document.getElementById("alert-refresh-countdown");

  if(!alertRefreshEnabled){
    element.textContent="Auto Refresh ปิดอยู่";
    return;
  }

  if(document.hidden){
    element.textContent="Auto Refresh หยุดชั่วคราว";
    return;
  }

  if(nextAlertRefreshAt===null){
    element.textContent="";
    return;
  }

  const remaining=Math.max(
    0,
    Math.ceil((nextAlertRefreshAt-Date.now())/1000)
  );

  element.textContent=`รีเฟรชครั้งถัดไปใน ${remaining} วินาที`;
}

function stopAlertRefresh(){
  if(alertRefreshTimer!==null){
    window.clearTimeout(alertRefreshTimer);
    alertRefreshTimer=null;
  }

  if(alertCountdownTimer!==null){
    window.clearInterval(alertCountdownTimer);
    alertCountdownTimer=null;
  }

  nextAlertRefreshAt=null;
  updateAlertCountdown();
}

function scheduleAlertRefresh(){
  stopAlertRefresh();

  if(!alertRefreshEnabled){
    setAlertStatus("Manual","paused");
    updateAlertCountdown();
    return;
  }

  if(document.hidden){
    setAlertStatus("Paused","paused");
    updateAlertCountdown();
    return;
  }

  nextAlertRefreshAt=Date.now()+alertRefreshIntervalMs;
  updateAlertCountdown();

  alertCountdownTimer=window.setInterval(
    updateAlertCountdown,
    1000
  );

  alertRefreshTimer=window.setTimeout(async()=>{
    try{
      await loadAlertMetrics();
    }catch(error){
      console.error("Alert metrics refresh failed",error);
    }finally{
      scheduleAlertRefresh();
    }
  },alertRefreshIntervalMs);
}

async function resumeAlertRefresh(){
  if(document.hidden){
    stopAlertRefresh();
    setAlertStatus("Paused","paused");
    return;
  }

  if(!alertRefreshEnabled){
    setAlertStatus("Manual","paused");
    updateAlertCountdown();
    return;
  }

  try{
    await loadAlertMetrics();
  }catch(error){
    console.error("Alert metrics resume failed",error);
  }finally{
    scheduleAlertRefresh();
  }
}

function toggleAlertRefresh(){
  alertRefreshEnabled=!alertRefreshEnabled;

  localStorage.setItem(
    ALERT_REFRESH_ENABLED_KEY,
    String(alertRefreshEnabled)
  );

  updateRefreshControls();

  if(alertRefreshEnabled){
    void resumeAlertRefresh();
  }else{
    stopAlertRefresh();
    setAlertStatus("Manual","paused");
  }
}

function changeAlertRefreshInterval(event){
  alertRefreshIntervalMs=Number(event.target.value);

  localStorage.setItem(
    ALERT_REFRESH_INTERVAL_KEY,
    String(alertRefreshIntervalMs)
  );

  scheduleAlertRefresh();
}

async function refreshAlertsNow(){
  try{
    await loadAlertMetrics();
  }catch(error){
    console.error("Manual alert refresh failed",error);
  }finally{
    scheduleAlertRefresh();
  }
}

async function loadAll(){
  await fetchJson("/v19/admin/session");
  const summary=await fetchJson("/v18/dashboard/summary");
  document.getElementById("summary").innerHTML=[
    card("Readiness",summary.readiness.ready?"READY":"NOT READY",summary.readiness.ready),
    card("Content ทั้งหมด",summary.metrics.content.total),
    card("Publish Failed",summary.metrics.publish_queue.failed,summary.metrics.publish_queue.failed===0),
    card("Open Incidents",summary.incidents.open,summary.incidents.open===0),
    card("Backups",summary.backups.count),
    card("Notification Failed",summary.notifications.failed,summary.notifications.failed===0)
  ].join("");

  await loadAlertMetrics();

  const incidents=await fetchJson("/v18/dashboard/incidents");
  document.getElementById("incidents").innerHTML=incidents.map(
    item=>`<tr><td>${item.id}</td><td>${item.code}</td><td>${item.severity}</td><td>${item.status}</td></tr>`
  ).join("");

  const deliveries=await fetchJson("/v18/dashboard/notifications");
  document.getElementById("notifications").innerHTML=deliveries.map(
    item=>`<tr><td>${item.id}</td><td>${item.provider}</td><td>${item.alert_code}</td><td>${item.status}</td></tr>`
  ).join("");

  await fetchJson("/v19/admin/audit",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      action:"admin.dashboard.view",
      detail:"Operations dashboard loaded"
    })
  });
}

function logout(){
  sessionStorage.removeItem("tmb_admin_api_key");
  window.location.href="/admin/login";
}

document.getElementById("alert-refresh-toggle")
  .addEventListener("click",toggleAlertRefresh);

document.getElementById("alert-refresh-interval")
  .addEventListener("change",changeAlertRefreshInterval);

document.getElementById("alert-refresh-now")
  .addEventListener("click",()=>{
    void refreshAlertsNow();
  });

updateRefreshControls();

document.addEventListener("visibilitychange",()=>{
  if(document.hidden){
    stopAlertRefresh();
    setAlertStatus("Paused","paused");
    return;
  }

  void resumeAlertRefresh();
});

loadAll()
  .then(()=>{
    scheduleAlertRefresh();
  })
  .catch(error=>{
    document.getElementById("summary").innerHTML=
      card("Dashboard Error",error.message,false);

    document.getElementById("alert-summary").innerHTML=
      card("Alert Metrics Error",error.message,false);

    document.getElementById("alerts-updated").textContent=
      "ไม่สามารถโหลดข้อมูล Alert Metrics ได้";

    setAlertStatus("Error","error");
    scheduleAlertRefresh();
  });
</script>
</body>
</html>
