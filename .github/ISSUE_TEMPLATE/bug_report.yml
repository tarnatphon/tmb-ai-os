name: Bug report
description: Report a reproducible problem
title: "fix: "
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Problem
      description: Describe what happened and what you expected.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: shell
