name: API Key Telemetry

on:
  pull_request:
  push:
    branches: [main, develop]

jobs:
  telemetry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: python scripts/check_api_key_telemetry.py
      - run: pytest tests/test_api_key_telemetry.py tests/test_api_v26_contract.py
