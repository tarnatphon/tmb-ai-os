name: Scope Enforcement Validation

on:
  pull_request:
  push:
    branches: [main, develop]

jobs:
  scope-enforcement:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: python scripts/check_scope_enforcement.py
      - run: pytest tests/test_security_policies.py tests/test_scope_authorization.py
