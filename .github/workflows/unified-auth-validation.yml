name: Unified Authentication Validation

on:
  pull_request:
  push:
    branches: [main, develop]

jobs:
  unified-auth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: python scripts/check_auth_migration.py
      - run: pytest tests/test_unified_auth.py tests/test_auth_migration_guard.py
