name: Legacy Call-Site Guard

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  legacy-callsites:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: python scripts/check_legacy_callsites.py
      - run: pytest tests/test_legacy_callsites.py
